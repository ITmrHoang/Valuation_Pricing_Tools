# Cấu hình mặc định cho AI Pricing Engine v0.2.0

[server]
host = "127.0.0.1"
port = 8080

[database]
url = "sqlite://data/pricing.db"
max_connections = 5

[logging]
level = "info"
format = "json"

# Cấu hình scraping mặc định
[scraping]
# Thời gian chờ giữa các request (ms)
rate_limit_ms = 1000
# Số lần retry tối đa khi request thất bại
max_retries = 3
# Timeout cho mỗi request (giây)
request_timeout_secs = 30
# User-Agent cho HTTP requests
user_agent = "ValuationPricingTools/0.2.0"

# Cấu hình proxy pool cho scraping đa luồng
[proxy]
enabled = false
health_check_interval_secs = 60
auto_retry_on_failure = true
# Danh sách proxy servers (uncomment và thêm proxy)
# [[proxy.proxies]]
# address = "proxy1.example.com"
# port = 8080
# proxy_type = "http"
# username = "user1"
# password = "pass1"
# label = "Proxy US-1"
#
# [[proxy.proxies]]
# address = "proxy2.example.com"
# port = 1080
# proxy_type = "socks5"
# label = "Proxy EU-1"

# Cấu hình marketplace NFT
[marketplaces.opensea]
enabled = true
base_url = "https://api.opensea.io/api/v2"
api_key = ""
rate_limit_ms = 500

[marketplaces.magic_eden]
enabled = true
base_url = "https://api-mainnet.magiceden.dev/v2"
api_key = ""
rate_limit_ms = 500

[marketplaces.blur]
enabled = false
base_url = "https://api.blur.io/v1"
api_key = ""
rate_limit_ms = 1000

# Cấu hình stock data
[stock_data]
provider = "yahoo_finance"
base_url = "https://query1.finance.yahoo.com/v8/finance"
# Khoảng thời gian lấy dữ liệu lịch sử (ngày)
history_days = 365
# Interval: 1d, 1wk, 1mo
interval = "1d"

# Cấu hình AI scoring mặc định
[scoring]
# Trọng số mặc định cho các thuộc tính NFT
[scoring.nft_weights]
rarity = 0.25
floor_price = 0.20
volume_24h = 0.15
market_cap = 0.15
trend = 0.10
liquidity = 0.10
holder_count = 0.05

# Trọng số mặc định cho các thuộc tính Stock (Technical)
[scoring.stock_weights]
volatility = 0.20
price_momentum = 0.15
volume_change = 0.15
rsi = 0.15
moving_avg_signal = 0.15
bollinger_position = 0.10
trend_strength = 0.10

# Trọng số cho Fundamental Analysis
[scoring.fundamental_weights]
pe_ratio = 0.20
pb_ratio = 0.15
eps_growth = 0.20
dividend = 0.15
dcf_margin = 0.15
stability = 0.15

# Cấu hình Fundamental Analysis
[fundamental]
# Tỷ lệ chiết khấu cho DCF (10%)
discount_rate = 0.10
# Tỷ lệ tăng trưởng terminal (3%)
terminal_growth_rate = 0.03
# Số năm dự phóng DCF
projection_years = 10
# Ngưỡng P/E cao
pe_high_threshold = 25.0
# Ngưỡng P/E thấp
pe_low_threshold = 15.0
# Ngưỡng margin of safety (20%)
margin_of_safety_threshold = 0.20

# Cấu hình CrewAI integration
[crew_ai]
enabled = true
webhook_path = "/api/v1/crew/webhook"
# Secret key để xác thực webhook
webhook_secret = ""
